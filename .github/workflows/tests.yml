name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  syntax-check:
    name: Syntax Check (all Python files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile all Python files
        run: |
          FAIL=0
          for f in $(find src/ -name '*.py'); do
            if ! python3 -m py_compile "$f" 2>/dev/null; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "Syntax errors found"
            exit 1
          fi
          echo "All Python files pass syntax check"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t thinkneo-mcp-server:test .

      - name: Verify container starts
        run: |
          docker run -d --name mcp-test \
            -p 18081:8081 \
            -e HOST=0.0.0.0 -e PORT=8081 \
            -e THINKNEO_API_KEY=test-key \
            -e MCP_DB_PASSWORD="" \
            thinkneo-mcp-server:test
          sleep 8
          docker logs mcp-test 2>&1 | grep "Wrapped.*tools"
          docker rm -f mcp-test

  smoke-test:
    name: Smoke Test (live endpoint)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: MCP Initialize
        run: |
          RESULT=$(curl -s --max-time 15 \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            "https://mcp.thinkneo.ai/mcp" \
            -d '{"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}')
          echo "$RESULT" | grep -q "ThinkNEO Control Plane" || exit 1
          echo "MCP Initialize: OK"

      - name: A2A Agent Card
        run: |
          curl -sf https://mcp.thinkneo.ai/.well-known/agent.json | python3 -c "
          import sys,json
          d=json.loads(sys.stdin.read())
          assert 'skills' in d, 'No skills in agent card'
          assert len(d['skills']) > 0, 'Empty skills'
          print(f'Agent Card: OK ({len(d[\"skills\"])} skills)')
          "

      - name: Landing Pages
        run: |
          for path in /mcp/docs /registry /.well-known/agent.json; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://mcp.thinkneo.ai$path")
            [ "$CODE" = "200" ] || { echo "FAIL: $path -> $CODE"; exit 1; }
            echo "OK: $path -> $CODE"
          done
