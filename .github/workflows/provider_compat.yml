name: Provider Compatibility

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:

jobs:
  anthropic:
    name: Anthropic (Sonnet, Haiku, Opus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx pytest pytest-timeout "psycopg[binary]" psycopg_pool
      - name: Run Anthropic compat tests
        run: pytest tests/compat/test_anthropic.py -q --tb=no -ra --timeout=60
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_COMPAT }}

  openai:
    name: OpenAI (GPT-4o, GPT-4o-mini, GPT-4.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx pytest pytest-timeout "psycopg[binary]" psycopg_pool
      - name: Run OpenAI compat tests
        run: pytest tests/compat/test_openai.py -q --tb=no -ra --timeout=60
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_COMPAT }}

  google:
    name: Google (Gemini 2.5 Flash, Pro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx pytest pytest-timeout "psycopg[binary]" psycopg_pool
      - name: Run Google compat tests
        run: pytest tests/compat/test_google.py -q --tb=no -ra --timeout=60
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY_COMPAT }}

  nvidia:
    name: NVIDIA NIM (Nemotron)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx pytest pytest-timeout "psycopg[binary]" psycopg_pool
      - name: Run NVIDIA compat tests
        run: pytest tests/compat/test_nvidia.py -q --tb=no -ra --timeout=60
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY_COMPAT }}

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [anthropic, openai, google, nvidia]
    if: failure()
    steps:
      - name: Report failure (no public broadcast)
        run: |
          echo "::error::Provider compat check failed — one or more providers returned a non-200 status (see job results above)."
          echo "Internal status is intentionally NOT broadcast to a public issue."
          echo "Failure is surfaced via the Actions run status and GitHub's built-in scheduled-workflow failure email to the workflow owner."
