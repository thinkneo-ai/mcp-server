services:
  thinkneo-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: thinkneo-mcp-server:latest
    container_name: thinkneo-mcp-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
      - "100.74.53.95:8081:8081"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "8081"
    healthcheck:
      test: ["CMD", "python3", "-c",
        "import urllib.request; req = urllib.request.Request('http://127.0.0.1:8081/mcp', data=b'{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"id\":1,\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}}}', headers={'Content-Type': 'application/json'}, method='POST'); urllib.request.urlopen(req, timeout=4)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
